<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContabIA — Iniciar sesión</title>
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Contab<span>IA</span></div>
    <div class="login-tagline">Su agente cierra sus libros.</div>

    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-input" placeholder="usted@empresa.co" value="kev@cantamar.co">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-input" placeholder="••••••••" value="••••••••">
    </div>

    <button class="btn btn-primary full-w" onclick="window.location='index.html'" style="justify-content:center; padding:11px 0; font-size:15px; margin-top:4px;">
      Iniciar sesión
    </button>

    <div class="login-divider">o</div>

    <button class="btn btn-ghost full-w" style="justify-content:center; padding:10px 0; font-size:14px;">
      Acceder con WhatsApp Business
    </button>

    <div style="text-align:center; margin-top:20px;">
      <a href="#" class="text-sm text-muted">¿Olvidó su contraseña?</a>
    </div>
  </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
