<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContabIA — Iniciar sesión · Gerente</title>
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">Contab<span>IA</span></div>
    <div class="login-tagline">Su agente cierra sus libros.</div>
    <div class="login-role-pill">Portal del <span class="accent">Gerente</span></div>

    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="email" class="form-input" placeholder="usted@empresa.co" value="yaritza@cantamar.co" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" autofocus>
    </div>

    <div id="error" class="login-error"></div>

    <button id="signin" class="btn btn-primary full-w" style="padding:12px 0; font-size:15px;">
      Iniciar sesión
    </button>

    <div class="login-divider">o</div>

    <button class="btn btn-ghost full-w" style="padding:10px 0; font-size:14px;" onclick="alert('Próximamente: acceso vía WhatsApp Business.')">
      Acceder con WhatsApp Business
    </button>

    <div class="login-switch">
      Soy
      <a href="login.html">Dueño</a>·<a href="login-contador.html">Contador</a>
    </div>
  </div>
</div>

<script>
  (function() {
    const PASSWORD = 'Scrooge';
    const ROLE     = 'manager';
    const REDIRECT = 'nomina.html';

    function attemptLogin() {
      const pw = document.getElementById('password').value;
      const err = document.getElementById('error');
      if (pw === PASSWORD) {
        sessionStorage.setItem('contabia_auth', '1');
        sessionStorage.setItem('contabia_role', ROLE);
        sessionStorage.setItem('contabia_entity', 'cantamar-001');
        location.href = REDIRECT;
      } else {
        err.textContent = 'Contraseña incorrecta.';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    document.getElementById('signin').addEventListener('click', attemptLogin);
    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') attemptLogin();
    });
  })();
</script>
</body>
</html>
