<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%231B2A4A%27/%3E%3Ctext x=%2716%27 y=%2722%27 font-family=%27Georgia%27 font-size=%2718%27 fill=%27%23D4704A%27 text-anchor=%27middle%27 font-weight=%27bold%27%3EC%3C/text%3E%3C/svg%3E">
  <title>ContabIA — Entregables</title>
  <link rel="stylesheet" href="css/portal.css">
  <style>
    .period-group {
      margin-bottom: 22px;
    }
    .period-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--light-gray);
    }
    .period-head .pname {
      font-family: var(--font-display);
      color: var(--midnight);
      font-size: 19px;
    }
    .period-head .pmeta {
      font-size: 12px;
      color: var(--warm-gray);
      font-family: var(--font-mono);
    }

    .file-row {
      background: var(--white);
      border: 1px solid var(--light-gray);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 44px 1fr auto auto;
      gap: 14px;
      align-items: center;
    }
    .file-row.not-ready { opacity: .55; }
    .file-row .ftype {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--cream);
    }
    .file-row .ftype.xlsx     { background: #1F7E3A; }
    .file-row .ftype.pdf      { background: #B22222; }
    .file-row .ftype.docx     { background: var(--ocean); }
    .file-row .ftype.json     { background: var(--midnight); }

    .file-row .fname {
      font-weight: 600;
      color: var(--midnight);
      font-size: 14.5px;
    }
    .file-row .fnote {
      font-size: 12px;
      color: var(--warm-gray);
      margin-top: 3px;
    }
    .file-row .source-tag {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 700;
      background: var(--sand);
      color: var(--midnight);
      font-family: var(--font-mono);
    }
    .file-row .source-tag.free_scan { background: #FBE8C9; color: #876022; }
    .file-row .fsize {
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--warm-gray);
    }
  </style>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>

  <main class="main">
    <div id="topbar-mount"></div>

    <div class="content">

      <div class="page-head">
        <div class="title-block">
          <h1>Entregables</h1>
          <div class="meta" id="page-meta">…</div>
        </div>
        <div class="actions">
          <a class="btn btn-secondary" href="auditoria.html">Auditoría →</a>
          <button class="btn btn-secondary" onclick="alert('Paquete completo descargado (mockup).')">↓ Todo</button>
        </div>
      </div>

      <div class="filter-chips" id="del-filters"></div>

      <div id="del-list"></div>

    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script>
let currentDelFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  const e = currentEntityData();
  const meta = e.meta;
  const ready = e.deliverables.filter(d => d.ready).length;

  document.getElementById('page-meta').innerHTML =
    `${meta.name} · archivo histórico · ${ready} de ${e.deliverables.length} listos para descargar`;

  renderFilters(e);
  renderList(e);
});

function renderFilters(e) {
  const cierreCount = e.deliverables.filter(d => d.source === 'cierre').length;
  const scanCount   = e.deliverables.filter(d => d.source === 'free_scan').length;
  const chips = [
    { key: 'all',       label: `Todos (${e.deliverables.length})` },
    { key: 'cierre',    label: `Cierres mensuales (${cierreCount})` },
    { key: 'free_scan', label: `Escaneo gratuito (${scanCount})` },
  ];
  document.getElementById('del-filters').innerHTML = chips.map(c => `
    <div class="filter-chip ${c.key===currentDelFilter?'active':''}" onclick="setDelFilter('${c.key}')">${c.label}</div>
  `).join('');
}

function setDelFilter(key) {
  currentDelFilter = key;
  const e = currentEntityData();
  renderFilters(e);
  renderList(e);
}

function renderList(e) {
  let items = e.deliverables;
  if (currentDelFilter !== 'all') items = items.filter(d => d.source === currentDelFilter);

  /* group by period */
  const byPeriod = items.reduce((acc, d) => {
    (acc[d.period] = acc[d.period] || []).push(d);
    return acc;
  }, {});

  /* sort periods most recent first — we'll trust insertion order matches data.js */
  const periods = Object.keys(byPeriod);

  document.getElementById('del-list').innerHTML = periods.length === 0
    ? `<div class="panel" style="text-align:center;color:var(--warm-gray);">Sin entregables en este filtro.</div>`
    : periods.map(p => {
      const files = byPeriod[p];
      const ready = files.filter(f => f.ready).length;
      return `
        <div class="period-group">
          <div class="period-head">
            <div class="pname">${p}</div>
            <div class="pmeta">${ready} / ${files.length} listos</div>
          </div>
          ${files.map(f => renderFile(f)).join('')}
        </div>`;
    }).join('');
}

function renderFile(f) {
  const cls = f.ready ? '' : 'not-ready';
  const sourceTag = f.source === 'free_scan'
    ? `<span class="source-tag free_scan" title="Escaneo gratuito de ContabIA">FREE-SCAN</span>`
    : '';
  const action = f.ready
    ? (f.path
        ? `<a class="btn btn-primary btn-sm" href="${f.path}" target="_blank">↓ Descargar</a>`
        : `<button class="btn btn-primary btn-sm" onclick="alert('Descarga simulada — archivo en S3.')">↓ Descargar</button>`)
    : `<span class="text-xs text-muted">En preparación</span>`;
  const note = f.note ? `<div class="fnote">${f.note}</div>` : '';
  return `
    <div class="file-row ${cls}">
      <div class="ftype ${f.type}">${f.type.toUpperCase()}</div>
      <div>
        <div class="fname">${f.name}</div>
        ${note}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${sourceTag}
        <div class="fsize">${f.size}</div>
      </div>
      <div>${action}</div>
    </div>`;
}
</script>
</body>
</html>
