<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%231B2A4A%27/%3E%3Ctext x=%2716%27 y=%2722%27 font-family=%27Georgia%27 font-size=%2718%27 fill=%27%23D4704A%27 text-anchor=%27middle%27 font-weight=%27bold%27%3EC%3C/text%3E%3C/svg%3E">
  <title>ContabIA — Comprobantes</title>
  <link rel="stylesheet" href="css/portal.css">
  <style>
    .je-card {
      background: var(--white);
      border: 1px solid var(--light-gray);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      margin-bottom: 12px;
    }
    .je-card .head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .je-card .je-id {
      font-family: var(--font-mono); font-size: 11.5px;
      color: var(--terracotta); font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .je-card .je-title {
      font-family: var(--font-display); font-size: 19px;
      color: var(--midnight); margin-top: 2px;
    }
    .je-card .je-desc { font-size: 13px; color: var(--warm-gray); margin-top: 4px; }
    .je-card .head-right {
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .je-lines { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
    .je-lines th, .je-lines td {
      padding: 9px 10px; font-size: 13px; text-align: left;
      border-bottom: 1px solid var(--light-gray);
    }
    .je-lines th {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--warm-gray); font-weight: 700;
    }
    .je-lines .acc { font-family: var(--font-mono); color: var(--ocean); font-weight: 600; }
    .je-lines .amt { font-family: var(--font-mono); text-align: right; font-weight: 600; }
    .je-lines .amt.dr { color: var(--midnight); }
    .je-lines .amt.cr { color: var(--ocean); }
    .je-lines tfoot td {
      border-top: 2px solid var(--midnight); border-bottom: none;
      font-weight: 700; font-size: 13.5px;
    }
    .je-actions {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; padding-top: 12px; border-top: 1px solid var(--light-gray);
      flex-wrap: wrap;
    }
    .je-actions .meta {
      font-size: 12px; color: var(--warm-gray);
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .je-actions .buttons { display: flex; gap: 8px; }
    .btn-approve {
      background: var(--success); color: var(--cream); border: none;
      padding: 8px 14px; border-radius: var(--radius);
      font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .btn-reject {
      background: var(--white); color: var(--critical); border: 1px solid var(--critical);
      padding: 8px 14px; border-radius: var(--radius);
      font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .je-blocked-note {
      background: rgba(212,160,74,.10); border: 1px solid #E8C896; color: #876022;
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 12px;
    }
    .je-blocked-note strong { color: var(--midnight); }
  </style>
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>

  <main class="main">
    <div id="topbar-mount"></div>

    <div class="content">

      <div class="page-head">
        <div class="title-block">
          <h1>Comprobantes (JEs)</h1>
          <div class="meta" id="page-meta">…</div>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" onclick="location.reload()">↻ Actualizar</button>
        </div>
      </div>

      <div id="alert-slot"></div>

      <div class="filter-chips" id="je-filters"></div>

      <div id="je-list"></div>

    </div>
  </main>
</div>

<script src="js/portal.js"></script>
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script>
let currentJEFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  const e = currentEntityData();
  const meta = e.meta;
  const cs = e.closeSummary;

  document.getElementById('page-meta').innerHTML =
    `${meta.name} · ${meta.period.toLowerCase()} · ${cs.total_jes} comprobantes (${cs.jes_pending} esperan aprobación)`;

  if (cs.jes_pending > 0) {
    document.getElementById('alert-slot').innerHTML = `
      <div class="alert-banner">
        <div class="alert-text">
          <div class="icon">!</div>
          <div class="copy"><strong>${cs.jes_pending} comprobante${cs.jes_pending===1?'':'s'} esperan aprobación.</strong> Cada uno se postea a ${meta.accounting_system} sólo después de su aprobación.</div>
        </div>
      </div>`;
  }

  renderFilters(e);
  renderList(e);
});

function renderFilters(e) {
  const items = e.journalEntries;
  const counts = {
    all:      items.length,
    pending:  items.filter(x => x.status === 'pending').length,
    approved: items.filter(x => x.status === 'approved').length,
    blocked:  items.filter(x => x.status === 'blocked').length,
  };
  const chips = [
    { key: 'all',      label: 'Todos' },
    { key: 'pending',  label: 'Pendientes' },
    { key: 'approved', label: 'Aprobados' },
    { key: 'blocked',  label: 'Bloqueados' },
  ];
  document.getElementById('je-filters').innerHTML = chips.map(c => `
    <div class="filter-chip ${c.key===currentJEFilter?'active':''}"
         onclick="setJEFilter('${c.key}')">${c.label} (${counts[c.key]||0})</div>
  `).join('');
}

function setJEFilter(key) {
  currentJEFilter = key;
  const e = currentEntityData();
  renderFilters(e);
  renderList(e);
}

function renderList(e) {
  const items = currentJEFilter === 'all'
    ? e.journalEntries
    : e.journalEntries.filter(x => x.status === currentJEFilter);

  document.getElementById('je-list').innerHTML = items.length === 0
    ? `<div class="panel" style="text-align:center;color:var(--warm-gray);">Sin comprobantes en este filtro.</div>`
    : items.map(je => renderJE(je)).join('');
}

function renderJE(je) {
  const totalDr = je.lines.reduce((s,l) => s + (l.debit  || 0), 0);
  const totalCr = je.lines.reduce((s,l) => s + (l.credit || 0), 0);
  const lines = je.lines.length === 0
    ? `<tr><td colspan="3" style="text-align:center;color:var(--warm-gray);padding:18px;">Sin líneas (bloqueado)</td></tr>`
    : je.lines.map(l => `
      <tr>
        <td><span class="acc">${l.account}</span> <span style="color:var(--charcoal);">${l.name}</span></td>
        <td class="amt dr">${l.debit  ? l.debit.toLocaleString('es-CO')  : ''}</td>
        <td class="amt cr">${l.credit ? l.credit.toLocaleString('es-CO') : ''}</td>
      </tr>`).join('');
  const blockedNote = je.blocked_by
    ? `<div class="je-blocked-note"><strong>Bloqueado por ${je.blocked_by.toUpperCase()}.</strong> Resolver la excepción primero.</div>`
    : '';
  const actions = je.status === 'approved'
    ? `<span style="color:var(--success);font-weight:700;">✓ Aprobado · listo para postear</span>`
    : je.status === 'blocked'
      ? `<span style="color:var(--warning);font-weight:700;">⚠ Bloqueado</span>`
      : `<button class="btn-reject" onclick="alert('Rechazo simulado — la excepción se devuelve a Angel.')">Rechazar</button>
         <button class="btn-approve" onclick="alert('Aprobación simulada — el motor postea a ${e_meta('accounting_system')}.')">Aprobar</button>`;
  return `
    <div class="je-card">
      <div class="head">
        <div>
          <div class="je-id">${je.id} · ${je.subtype}</div>
          <div class="je-title">${je.title}</div>
          <div class="je-desc">${je.description}</div>
        </div>
        <div class="head-right">
          <span class="badge badge-${je.status}">${statusLabel(je.status)}</span>
          <span class="priority-badge badge-${je.priority}">${je.priority.toUpperCase()}</span>
        </div>
      </div>
      ${blockedNote}
      <table class="je-lines">
        <thead><tr><th>Cuenta</th><th style="text-align:right;">Débito</th><th style="text-align:right;">Crédito</th></tr></thead>
        <tbody>${lines}</tbody>
        ${je.lines.length > 0 ? `<tfoot><tr><td>Total</td><td class="amt dr">${totalDr.toLocaleString('es-CO')}</td><td class="amt cr">${totalCr.toLocaleString('es-CO')}</td></tr></tfoot>` : ''}
      </table>
      <div class="je-actions">
        <div class="meta">
          <span>Confianza ${Math.round(je.ai_confidence*100)}%</span>
          <span>Creado ${fmtDate(je.created_at)}</span>
        </div>
        <div class="buttons">${actions}</div>
      </div>
    </div>`;
}

function statusLabel(s) {
  return ({pending:'Pendiente',approved:'Aprobado',rejected:'Rechazado',
           posted:'Registrado',blocked:'Bloqueado'})[s] || s;
}
function e_meta(k) { return currentEntityData().meta[k]; }
</script>
</body>
</html>
