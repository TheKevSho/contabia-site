<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%276%27 fill=%27%231B2A4A%27/%3E%3Ctext x=%2716%27 y=%2722%27 font-family=%27Georgia%27 font-size=%2718%27 fill=%27%23D4704A%27 text-anchor=%27middle%27 font-weight=%27bold%27%3EC%3C/text%3E%3C/svg%3E">
  <title>ContabIA — Resumen</title>
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>
<div class="shell">
  <div id="sidebar-mount"></div>

  <main class="main">
    <div id="topbar-mount"></div>

    <div class="content">

      <!-- PAGE HEAD -->
      <div class="page-head">
        <div class="title-block">
          <h1 id="greeting">Resumen</h1>
          <div class="meta" id="page-meta">…</div>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" onclick="location.reload()">↻ Actualizar</button>
        </div>
      </div>

      <!-- Sections render in role-aware order via JS -->
      <div id="resumen-sections"></div>

    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script>
/* ============================================================
   Resumen page — renders all sections from data.js,
   reorders by current role.
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  const e    = currentEntityData();
  const role = currentRole();
  const meta = e.meta;
  const user = currentUser();

  /* page head */
  const hour = new Date().getHours();
  const saludo = hour < 12 ? 'Buenos días' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';
  const firstName = user.name.split(' ')[0];
  document.getElementById('greeting').textContent = `${saludo}, ${firstName}`;
  document.getElementById('page-meta').innerHTML =
    `${meta.name} · ${meta.period.toLowerCase()} · procesado <strong>${meta.processed_at}</strong>`;

  /* sections */
  const sections = {
    alert:    sectionAlert(e),
    queue:    sectionActionQueue(e, role),
    estado:   sectionEstadoCierre(e),
    cifras:   sectionCifras(e),
    detalle:  sectionDetalle(e),
    rec_risk: sectionRecAndRisk(e),
    activity: sectionActivity(e),
  };

  /* role-aware order */
  const order = role === 'accountant'
    ? ['alert','queue','estado','rec_risk','detalle','cifras','activity']
    : ['alert','queue','estado','cifras','detalle','rec_risk','activity'];

  document.getElementById('resumen-sections').innerHTML =
    order.map(k => sections[k]).join('');
});

/* ------------------------------------------------------------
   Section builders
   ------------------------------------------------------------ */
function sectionAlert(e) {
  const cs = e.closeSummary;
  if (cs.open_critical === 0 && cs.jes_pending === 0) return '';
  return `
    <div class="alert-banner">
      <div class="alert-text">
        <div class="icon">!</div>
        <div class="copy">
          <strong>Cierre de ${e.meta.period.toLowerCase()} en curso.</strong>
          ${cs.open_critical} excepción${cs.open_critical===1?'':'es'} crítica${cs.open_critical===1?'':'s'}
          y ${cs.jes_pending} comprobante${cs.jes_pending===1?'':'s'} esperan aprobación antes de cerrar el mes.
          <a href="exceptions.html">Ver pendientes →</a>
        </div>
      </div>
      <a class="snooze" onclick="snoozeBanner(this)">recordar mañana</a>
    </div>`;
}

function sectionActionQueue(e, role) {
  const queue = actionQueue();
  const label = role === 'accountant' ? 'Tu cola' : 'Hacer ahora';
  const cards = queue.map(a => `
    <div class="action-card ${a.accent}" onclick="location.href='${a.href}'">
      <div class="label ${a.label_class}">${a.label}</div>
      <div class="title">${a.title}</div>
      ${a.amount ? `<div class="amount">${a.amount}</div>` : ''}
      <div class="meta">${a.meta}</div>
      <div class="cta">${a.cta}</div>
    </div>`).join('');
  return `
    <div class="section-label">${label}</div>
    <div class="action-grid">${cards}</div>`;
}

function sectionEstadoCierre(e) {
  const cs = e.closeSummary;
  const stepsHtml = cs.steps.map(s => {
    const icon = s.status === 'done' ? '✓' : s.status === 'review' ? '!' : s.status === 'blocked' ? '×' : '·';
    return `
      <div class="step">
        <div class="icon ${s.status}">${icon}</div>
        <div class="name">${s.name}</div>
        <div class="sub">${s.sub}</div>
      </div>`;
  }).join('');
  return `
    <div class="section-label">Estado del cierre</div>
    <div class="close-strip">
      <div class="header">
        <div class="title-row">
          <div class="month">${e.meta.period}</div>
          <div class="pct">${cs.pct}% completo</div>
        </div>
        <div class="eta">Listo para entregar el <strong>${cs.eta}</strong></div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${cs.pct}%"></div>
      </div>
      <div class="steps">${stepsHtml}</div>
    </div>`;
}

function sectionCifras(e) {
  const c = e.cifras;
  const plata = c.plata_en_riesgo;
  const plataHtml = `
    <div class="number-tile feature">
      <div>
        <div class="tile-label">Plata en riesgo</div>
        <div class="tile-value"><span class="currency">COP</span>${plata.total.toLocaleString('es-CO')}</div>
      </div>
      <div class="tile-breakdown">
        ${plata.breakdown.map(b => `
          <div class="row"><span>${b.label}</span><span class="v">${b.value.toLocaleString('es-CO')}</span></div>
        `).join('')}
      </div>
      <div class="footer-link" onclick="location.href='exceptions.html'">Resolver brechas →</div>
    </div>`;
  const recu = c.recuperacion;
  const recuHtml = `
    <div class="number-tile">
      <div>
        <div class="tile-label">Recuperación tributaria</div>
        <div class="tile-value"><span class="currency">COP</span>${recu.total.toLocaleString('es-CO')}</div>
      </div>
      <div class="tile-breakdown">
        ${recu.breakdown.map(b => `
          <div class="row"><span>${b.label}</span><span class="v">${b.value}</span></div>
        `).join('')}
      </div>
      <div class="footer-link" onclick="location.href='tributario.html'">Ver detalle →</div>
    </div>`;
  const k = c.kpi_usali;
  const kpiHtml = `
    <div class="number-tile">
      <div>
        <div class="tile-label">${k.primary_label}</div>
        <div class="tile-value">${k.primary_value}<span class="currency" style="font-size:24px;margin-left:2px">${k.primary_unit}</span></div>
      </div>
      <div class="tile-breakdown">
        ${k.breakdown.map(b => `
          <div class="row"><span>${b.label}</span><span class="v">${b.value}</span></div>
        `).join('')}
      </div>
      <div class="footer-link">Ver KPIs operativos →</div>
    </div>`;
  return `
    <div class="section-label">Cifras del mes</div>
    <div class="numbers-grid">${plataHtml}${recuHtml}${kpiHtml}</div>`;
}

function sectionDetalle(e) {
  const taxRows = e.tax_summary.map(t => `
    <div class="tax-row">
      <div class="concept">
        <div class="name">${t.name}</div>
        <div class="desc">${t.desc}</div>
      </div>
      <div class="amount ${t.amount_class}">${t.amount}</div>
      <div class="status ${t.status}">${t.status_label}</div>
    </div>`).join('');
  const taxPanel = `
    <div class="panel">
      <div class="panel-header">
        <h3>Resumen tributario</h3>
        <a class="more" onclick="location.href='tributario.html'">Ver Tributario →</a>
      </div>
      <div class="tax-table">${taxRows}</div>
    </div>`;
  const otaRows = e.ota_breakdown.map(o => `
    <div class="ota-row">
      <div class="badge-square ${o.cls}">${o.code}</div>
      <div class="name">${o.name}<span class="model">${o.model}</span></div>
      <div class="reservas">${o.reservas} res</div>
      <div class="commission">${o.commission === 0 ? '—' : o.commission.toLocaleString('es-CO')}</div>
    </div>`).join('');
  const otaPanel = `
    <div class="panel">
      <div class="panel-header">
        <h3>OTAs del mes</h3>
        <a class="more" onclick="location.href='reconciliacion.html'">Ver Reconciliación →</a>
      </div>
      <div class="ota-list">${otaRows}</div>
    </div>`;
  return `
    <div class="section-label">Detalle del mes</div>
    <div class="two-col" style="margin-bottom:14px;">${taxPanel}${otaPanel}</div>`;
}

function sectionRecAndRisk(e) {
  const t = e.three_way_rec;
  const parts = [];
  t.legs.forEach((l, i) => {
    parts.push(`
      <div class="three-way-leg">
        <div class="leg-label">${l.label}</div>
        <div class="leg-value">${l.value.toLocaleString('es-CO')}</div>
        <div class="leg-source">${l.source}</div>
      </div>`);
    if (i < t.legs.length - 1) {
      const a = t.arrows[i] || 'ok';
      parts.push(`<div class="three-way-arrow ${a==='ok'?'':a}">→</div>`);
    }
  });
  const recPanel = `
    <div class="panel">
      <div class="panel-header">
        <h3>Conciliación 3 vías</h3>
        <a class="more" onclick="location.href='reconciliacion.html'">Ver Reconciliación →</a>
      </div>
      <div class="three-way">${parts.join('')}</div>
      <div class="three-way-status ${t.status}">
        <span>${t.message}</span>
        <span style="font-weight:700;cursor:pointer" onclick="location.href='reconciliacion.html'">${t.cta}</span>
      </div>
    </div>`;
  const riskRows = e.plata_en_riesgo_detalle.map(r => `
    <div class="risk-item">
      <div class="left">
        <div class="name">${r.name}</div>
        <div class="why">${r.why}</div>
      </div>
      <div class="right">
        <div class="amt">${typeof r.amt === 'number' ? 'COP ' + r.amt.toLocaleString('es-CO') : r.amt}</div>
        <div class="ct">${r.ct}</div>
      </div>
    </div>`).join('');
  const riskPanel = `
    <div class="panel">
      <div class="panel-header">
        <h3>Plata en riesgo · detalle</h3>
        <a class="more" onclick="location.href='exceptions.html'">Resolver todo →</a>
      </div>
      <div class="risk-list">${riskRows}</div>
    </div>`;
  return `<div class="two-col" style="margin-bottom:14px;">${recPanel}${riskPanel}</div>`;
}

function sectionActivity(e) {
  const rows = e.activity.map(a => `
    <div class="activity-row">
      <div class="time">${a.time}</div>
      <div class="desc">${a.desc}</div>
      <div class="pill ${a.pill}">${a.pill_label}</div>
    </div>`).join('');
  return `
    <div class="section-label">Actividad reciente del agente</div>
    <div class="activity">${rows}</div>`;
}

/* snooze banner — 24h sessionStorage flag */
function snoozeBanner(el) {
  const banner = el.closest('.alert-banner');
  if (banner) banner.style.display = 'none';
  sessionStorage.setItem('contabia_snooze_alert', String(Date.now() + 24*60*60*1000));
}
</script>
</body>
</html>
